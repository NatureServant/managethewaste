<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Waste Sorting Assistant</title>
    <link rel="shortcut icon" href="log/earth.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <h1>AI Waste Sorting Assistant</h1>
            <p class="additional">Upload an image of waste to analyze its type and provide sorting instructions.</p>
            <div class="form">
                <input type="file" id="imageUpload" accept="image/*">
                <button id="analyzeButton">Analyze</button>
            </div>
            <div id="result">
            </div>
        </div>
    </div>
